apiVersion: apps/v1
kind: Deployment
metadata:
  name: dashboard-service
  namespace: pingflow
  labels:
    app: dashboard-service
    tier: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: dashboard-service
  template:
    metadata:
      labels:
        app: dashboard-service
        tier: backend
    spec:
      containers:
      - name: dashboard-service
        image: pingflow/dashboard-service:latest
        ports:
        - containerPort: 3002
        envFrom:
        - configMapRef:
            name: pingflow-config
        env:
        - name: PORT
          value: "3002"
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 3002
          initialDelaySeconds: 30
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 3002
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: dashboard-service
  namespace: pingflow
spec:
  selector:
    app: dashboard-service
  ports:
  - port: 3002
    targetPort: 3002
  type: ClusterIP
