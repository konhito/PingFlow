apiVersion: apps/v1
kind: Deployment
metadata:
  name: pingflow-frontend
  namespace: pingflow
  labels:
    app: pingflow-frontend
    tier: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: pingflow-frontend
  template:
    metadata:
      labels:
        app: pingflow-frontend
        tier: frontend
    spec:
      containers:
      - name: pingflow-frontend
        image: pingflow/frontend:latest
        ports:
        - containerPort: 3000
        envFrom:
        - configMapRef:
            name: pingflow-config
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: pingflow-secrets
              key: database-url
        - name: NEXTAUTH_SECRET
          valueFrom:
            secretKeyRef:
              name: pingflow-secrets
              key: nextauth-secret
        - name: NEXTAUTH_URL
          value: "https://pingflow.konhito.me"
        - name: STRIPE_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: pingflow-secrets
              key: stripe-secret-key
        - name: STRIPE_WEBHOOK_SECRET
          valueFrom:
            secretKeyRef:
              name: pingflow-secrets
              key: stripe-webhook-secret
        - name: NEXT_PUBLIC_APP_URL
          value: "https://pingflow.konhito.me"
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /api/health
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /api/health
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: pingflow-frontend
  namespace: pingflow
spec:
  selector:
    app: pingflow-frontend
  ports:
  - port: 3000
    targetPort: 3000
  type: ClusterIP
