apiVersion: apps/v1
kind: Deployment
metadata:
  name: event-producer
  labels:
    app: event-producer
spec:
  replicas: 2
  selector:
    matchLabels:
      app: event-producer
  template:
    metadata:
      labels:
        app: event-producer
    spec:
      containers:
      - name: event-producer
        image: pingflow/event-producer:latest
        ports:
        - containerPort: 3001
        env:
        - name: KAFKA_BROKER
          value: "kafka:9092"
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: pingflow-secrets
              key: database-url
        - name: REDIS_URL
          value: "redis://redis:6379"
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: event-producer
spec:
  selector:
    app: event-producer
  ports:
  - port: 3001
    targetPort: 3001
  type: ClusterIP
