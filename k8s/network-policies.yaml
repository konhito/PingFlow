# ── Default: deny all ingress within the pingflow namespace ───────────────────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-ingress
  namespace: pingflow
spec:
  podSelector: {}
  policyTypes:
  - Ingress
---
# ── Frontend: accept traffic only from the Ingress controller ─────────────────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress-to-frontend
  namespace: pingflow
spec:
  podSelector:
    matchLabels:
      app: pingflow-frontend
  policyTypes:
  - Ingress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: ingress-nginx
    ports:
    - protocol: TCP
      port: 3000
---
# ── API Gateway: accept traffic from Ingress controller ───────────────────────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress-to-api-gateway
  namespace: pingflow
spec:
  podSelector:
    matchLabels:
      app: api-gateway
  policyTypes:
  - Ingress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: ingress-nginx
    ports:
    - protocol: TCP
      port: 4000
---
# ── Event Producer: accept from Ingress + api-gateway ────────────────────────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-event-producer-ingress
  namespace: pingflow
spec:
  podSelector:
    matchLabels:
      app: event-producer
  policyTypes:
  - Ingress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: ingress-nginx
    - podSelector:
        matchLabels:
          app: api-gateway
    ports:
    - protocol: TCP
      port: 3001
---
# ── Dashboard Service: accept from Ingress controller (WebSocket) ─────────────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dashboard-ingress
  namespace: pingflow
spec:
  podSelector:
    matchLabels:
      app: dashboard-service
  policyTypes:
  - Ingress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: ingress-nginx
    - podSelector:
        matchLabels:
          app: pingflow-frontend
    ports:
    - protocol: TCP
      port: 3002
---
# ── Kafka: accept from microservices only ─────────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-kafka-from-services
  namespace: pingflow
spec:
  podSelector:
    matchLabels:
      app: kafka
  policyTypes:
  - Ingress
  ingress:
  - from:
    - podSelector:
        matchLabels:
          app: event-producer
    - podSelector:
        matchLabels:
          app: dashboard-service
    - podSelector:
        matchLabels:
          app: discord-service
    - podSelector:
        matchLabels:
          app: telegram-service
    - podSelector:
        matchLabels:
          app: whatsapp-service
    - podSelector:
        matchLabels:
          app: email-service
    - podSelector:
        matchLabels:
          app: api-gateway
    ports:
    - protocol: TCP
      port: 9092
---
# ── Zookeeper: accept from Kafka only ────────────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-zookeeper-from-kafka
  namespace: pingflow
spec:
  podSelector:
    matchLabels:
      app: zookeeper
  policyTypes:
  - Ingress
  ingress:
  - from:
    - podSelector:
        matchLabels:
          app: kafka
    ports:
    - protocol: TCP
      port: 2181
---
# ── Redis: accept from dashboard + api-gateway + event-producer ───────────────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-redis-from-services
  namespace: pingflow
spec:
  podSelector:
    matchLabels:
      app: redis
  policyTypes:
  - Ingress
  ingress:
  - from:
    - podSelector:
        matchLabels:
          app: dashboard-service
    - podSelector:
        matchLabels:
          app: api-gateway
    - podSelector:
        matchLabels:
          app: event-producer
    - podSelector:
        matchLabels:
          app: discord-service
    - podSelector:
        matchLabels:
          app: telegram-service
    ports:
    - protocol: TCP
      port: 6379
---
# ── PostgreSQL: accept from event-producer + api-gateway only ─────────────────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-postgres-from-services
  namespace: pingflow
spec:
  podSelector:
    matchLabels:
      app: postgres
  policyTypes:
  - Ingress
  ingress:
  - from:
    - podSelector:
        matchLabels:
          app: event-producer
    - podSelector:
        matchLabels:
          app: api-gateway
    ports:
    - protocol: TCP
      port: 5432
