apiVersion: apps/v1
kind: Deployment
metadata:
  name: discord-service
  labels:
    app: discord-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: discord-service
  template:
    metadata:
      labels:
        app: discord-service
    spec:
      containers:
      - name: discord-service
        image: pingflow/discord-service:latest
        env:
        - name: KAFKA_BROKER
          value: "kafka:9092"
        - name: REDIS_URL
          value: "redis://redis:6379"
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: whatsapp-service
  labels:
    app: whatsapp-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: whatsapp-service
  template:
    metadata:
      labels:
        app: whatsapp-service
    spec:
      containers:
      - name: whatsapp-service
        image: pingflow/whatsapp-service:latest
        env:
        - name: KAFKA_BROKER
          value: "kafka:9092"
        - name: WHATSAPP_API_URL
          valueFrom:
            secretKeyRef:
              name: pingflow-secrets
              key: whatsapp-api-url
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
---
apiVersion: apps/v1
