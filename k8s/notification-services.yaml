# ── Discord Service ────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: discord-service
  namespace: pingflow
  labels:
    app: discord-service
    tier: notification
spec:
  replicas: 2
  selector:
    matchLabels:
      app: discord-service
  template:
    metadata:
      labels:
        app: discord-service
        tier: notification
    spec:
      containers:
      - name: discord-service
        image: pingflow/discord-service:latest
        envFrom:
        - configMapRef:
            name: pingflow-config
        env:
        - name: DISCORD_BOT_TOKEN
          valueFrom:
            secretKeyRef:
              name: pingflow-secrets
              key: discord-bot-token
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
        livenessProbe:
          exec:
            command: ["node", "-e", "require('http').get('http://localhost:3003/health', r => process.exit(r.statusCode===200?0:1))"]
          initialDelaySeconds: 30
          periodSeconds: 30
          failureThreshold: 3
        readinessProbe:
          exec:
            command: ["node", "-e", "require('http').get('http://localhost:3003/health', r => process.exit(r.statusCode===200?0:1))"]
          initialDelaySeconds: 10
          periodSeconds: 10
          failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: discord-service
  namespace: pingflow
spec:
  selector:
    app: discord-service
  ports:
  - port: 3003
    targetPort: 3003
  type: ClusterIP
---
