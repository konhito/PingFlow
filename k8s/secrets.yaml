apiVersion: v1
kind: Secret
metadata:
  name: pingflow-secrets
type: Opaque
stringData:
  database-url: "postgresql://user:password@postgres:5432/pingflow"
  whatsapp-api-url: "https://your-ec2-instance.com/api"
  telegram-bot-token: "your-telegram-bot-token"
  smtp-user: "your-smtp-user@gmail.com"
  smtp-pass: "your-smtp-password"
  jwt-secret: "your-jwt-secret-key"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: pingflow-config
data:
  KAFKA_BROKER: "kafka:9092"
  REDIS_URL: "redis://redis:6379"
  NODE_ENV: "production"
