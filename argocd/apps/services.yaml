apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: pingflow-services
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: pingflow
  finalizers:
  - resources-finalizer.argocd.argoproj.io
spec:
  project: pingflow
  source:
    repoURL: https://github.com/konhito/PingFlow.git
    targetRevision: main
    path: k8s
    directory:
      include: "{frontend.yaml,event-producer.yaml,dashboard-service.yaml,notification-services.yaml,api-gateway.yaml}"
  destination:
    server: https://kubernetes.default.svc
    namespace: pingflow
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
